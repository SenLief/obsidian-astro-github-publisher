name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate tag matches manifest version
        run: |
          node -e 'const fs=require("fs"); const version=JSON.parse(fs.readFileSync("manifest.json","utf8")).version; const tag=process.env.GITHUB_REF_NAME; if (tag !== version) { console.error("Tag " + tag + " must match manifest version " + version + ". Use a tag like " + version + ", not v" + version + "."); process.exit(1); }'

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            versions.json
